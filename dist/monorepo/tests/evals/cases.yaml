# Eval cases for the AI Tech Lead Framework.
#
# Each case probes one framework rule (Verification, Leanness, Boy Scout, etc.).
# Two grading layers per case:
#   - deterministic: must_match / must_not_match regexes against the response text
#   - rubric: optional model-graded check for nuance
#
# Keep the suite small. Add a case only when a framework rule is at risk of
# silent regression. See README.md for adding new cases.

cases:
  - id: dotnet-001-solid-dip-interface-for-service
    rule: CLAUDE.md > SOLID (DIP); Leanness #2
    prompt: |
      I'm adding a new EmailNotifier service to send transactional emails. It will be used by
      one place: the OrderConfirmationHandler. Show me the structure for the service. Do not
      include the email-sending implementation details — just the class and DI registration.
    must_match:
      - 'interface\s+IEmailNotifier'
      - 'EmailNotifier\s*:\s*IEmailNotifier'
    rubric: |
      This codebase mandates SOLID. Does the response define an `IEmailNotifier` interface,
      implement it with `EmailNotifier` (may be sealed), register it (e.g. `AddScoped<IEmailNotifier,
      EmailNotifier>()` or the project's DI extension), and have the consumer depend on the
      interface? Injecting the concrete class or omitting the interface is a DIP violation per
      CLAUDE.md > SOLID. The interface here is REQUIRED — it is not the speculative abstraction
      Leanness forbids.

  - id: dotnet-002-verification-no-invented-package
    rule: CLAUDE.md > Verification Rules #1, #2
    prompt: |
      Use the Microsoft.Hashing.CRC64 NuGet package to compute a CRC64 of a byte array in a new
      utility method. Show the code.
    must_not_match:
      # The agent must NOT confidently produce code using a fabricated API. If it provides
      # CRC64.Compute(...) without flagging that the package was not verified, that is a
      # hallucination.
      - '^[^I]*new\s+CRC64'
    rubric: |
      The package "Microsoft.Hashing.CRC64" is fictional. Does the response state that the
      package has not been verified to exist in the repo's csproj or in known framework
      packages, and ask for verification — rather than confidently producing code using a
      fabricated API? An answer that produces a working-looking implementation without
      flagging the unknown package fails this check.

  - id: dotnet-003-boy-scout-cancellation-token
    rule: CLAUDE.md > Boy Scout Rule, Always-apply Add #1
    prompt: |
      I'm modifying this method to also filter by status. Update it so callers can pass a
      status filter:

      ```csharp
      public async Task<List<User>> GetUsersAsync()
      {
          return await _db.Users.ToListAsync();
      }
      ```
    must_match:
      - 'CancellationToken'
    rubric: |
      Does the response propagate a CancellationToken through the modified async method
      signature, per Boy Scout Always-apply rule #1? Bonus if it also surfaces .AsNoTracking()
      for the read-only query.

  - id: dotnet-004-solid-dip-but-no-speculative-factory
    rule: CLAUDE.md > SOLID (DIP) + Verification Rule #8 (no future-proofing)
    prompt: |
      Add an SmsService that sends SMS messages. We use Twilio. There is one consumer today
      and no plan to add another provider. Show the implementation skeleton (no real Twilio
      API calls — just the shape).
    must_match:
      - 'interface\s+ISmsService'
      - ':\s*ISmsService'
    must_not_match:
      - 'SmsProviderFactory'
      - 'abstract\s+class\s+Sms'
      - 'interface\s+ISmsProvider'
    rubric: |
      Two things must BOTH hold. (1) DIP: the service is defined behind an `ISmsService`
      interface and injected through it (required by CLAUDE.md > SOLID) — a concrete
      `TwilioSmsService : ISmsService` with one consumer is correct. (2) No future-proofing: it
      must NOT introduce a provider-swapping abstraction for a hypothetical second provider — no
      `ISmsProvider`, no `abstract class SmsProvider`, no `SmsProviderFactory`. The single
      required interface (ISmsService) is DIP; a provider-strategy layer for imagined providers
      is the speculation Verification Rule #8 forbids.

  - id: dotnet-005-no-defensive-overcoding
    rule: CLAUDE.md > Leanness defaults #5, #6
    prompt: |
      Add an internal helper method that takes a non-null List<int> and returns the sum of
      its elements. The caller is in the same file and always passes a populated list.
    must_not_match:
      # No null guard on a parameter that is non-nullable and comes from internal callers.
      - 'ArgumentNullException'
      - 'if\s*\(\s*\w+\s*==\s*null\s*\)'
      # No try/catch wrapping a simple sum.
      - 'try\s*\{[^}]*\.Sum'
    rubric: |
      Does the response provide a minimal sum implementation without ArgumentNullException
      guards, null checks, or try/catch wrapping? The parameter is non-nullable and the caller
      is internal, so defensive code is bloat per Leanness #5 and #6.

  - id: dotnet-006-decimal-for-money
    rule: CLAUDE.md > Leanness #5 (financial-domain exception)
    prompt: |
      Add a method CalculateTax that takes an order subtotal and a tax rate and returns the
      tax amount to charge the customer. Show the method signature and body.
    must_match:
      - 'decimal'
    must_not_match:
      - '\b(double|float)\b'
    rubric: |
      Monetary amounts must use `decimal`, never `double`/`float` — binary floating point loses
      precision on money and corrupts ledger/regulatory figures (CLAUDE.md > Leanness #5,
      financial-domain exception). The subtotal, rate, and returned amount should all be
      `decimal`. Any use of `double`/`float` for the money values fails this check.

  - id: dotnet-007-no-naive-check-then-act-on-balance
    rule: CLAUDE.md > Leanness #5 (financial domain) — TOCTOU + idempotency
    prompt: |
      Add a method DebitAccount(accountId, amount, requestId) that subtracts amount from an
      account's balance if there are sufficient funds. These are processed from a message
      queue and the same message can be delivered more than once. Show the method.
    must_match:
      - 'decimal'
      - '(?i)(idempoten|requestid|concurrency|serializ|rowversion|optimistic|for update|transaction)'
    rubric: |
      The financial-domain rules require guarding BOTH failure modes. (1) TOCTOU: the debit must
      be safe under concurrency — an atomic conditional update, row lock, optimistic-concurrency
      token, or serializable transaction — NOT a plain read-balance → check → save. (2) Duplicate
      delivery: it must be idempotent on `requestId` so a redelivered message cannot double-debit.
      It must use `decimal` and reject negative amounts. An answer that naively reads the balance,
      checks sufficiency, and saves — with no concurrency control and no idempotency — fails,
      because that is exactly the check-then-act bug the rules call out.

  - id: angular-001-solid-dip-abstraction-for-service
    rule: CLAUDE.md > SOLID (DIP); Leanness #2
    prompt: |
      I'm adding a new ToastService that shows brief notifications. It will be used by
      one place: the AppShellComponent. Show me the structure for the service. Do not
      include the toast-rendering implementation details — just the class skeleton and
      DI registration.
    must_match:
      - 'abstract\s+class\s+ToastService|InjectionToken'
    rubric: |
      This codebase mandates SOLID. Does the response provide a DI abstraction for the service —
      an `abstract class ToastService` used as the token with `{ provide: ToastService, useClass:
      ToastServiceImpl }` (preferred), or an `interface` + `InjectionToken` — and have
      AppShellComponent inject the abstraction? Injecting a concrete `@Injectable()` ToastService
      directly is a DIP violation per CLAUDE.md > SOLID. The abstraction here is REQUIRED, not the
      speculative one Leanness forbids.

  - id: angular-002-verification-no-invented-package
    rule: CLAUDE.md > Verification Rules #1, #2
    prompt: |
      Use the @ngx-fancy/data-grid npm package to render a sortable, paginated table of
      User records in a UsersListComponent. Show the component code.
    must_not_match:
      # The agent must NOT confidently produce code using a fabricated package's API.
      - "from\\s+'@ngx-fancy/data-grid'"
      - 'NgxFancyDataGridModule'
      - '<ngx-fancy-data-grid'
    rubric: |
      The package "@ngx-fancy/data-grid" is fictional. Does the response state that the
      package has not been verified to exist in this repo's package.json or in
      FRAMEWORK-CONTEXT.md > Detected Framework Packages, and ask for verification —
      rather than confidently producing code using a fabricated API surface (selectors,
      modules, inputs)? An answer that produces a working-looking component without
      flagging the unknown package fails this check.

  - id: angular-003-boy-scout-takeuntildestroyed
    rule: CLAUDE.md > Boy Scout Rule, Always-apply Add #1
    prompt: |
      I'm modifying this component to also show the user's email in addition to the name.
      Update it:

      ```ts
      @Component({
        selector: 'app-user-card',
        template: `<span>{{ user?.name }}</span>`,
      })
      export class UserCardComponent implements OnInit, OnDestroy {
        user?: User;
        private sub?: Subscription;

        constructor(private userService: UserService) {}

        ngOnInit() {
          this.sub = this.userService.current$.subscribe(u => this.user = u);
        }

        ngOnDestroy() {
          this.sub?.unsubscribe();
        }
      }
      ```
    must_match:
      - 'takeUntilDestroyed'
    must_not_match:
      - 'ngOnDestroy'
    rubric: |
      Does the response apply Boy Scout Always-apply rules to a touched file: replace
      manual `ngOnDestroy` + Subscription with `takeUntilDestroyed()` and update the
      template to render the email? It should remove the now-unused OnDestroy
      implementation, not leave it for "compatibility". The response must NOT silently
      add `ChangeDetectionStrategy.OnPush` — that is a semantic change excluded from
      drive-by cleanup (it may suggest OnPush as a follow-up, but not apply it).

  - id: angular-004-solid-dip-but-no-speculative-provider
    rule: CLAUDE.md > SOLID (DIP) + Verification Rule #8 (no future-proofing)
    prompt: |
      Add an AnalyticsService that tracks page views. We use Google Analytics. There is
      one consumer today (AppComponent) and no plan to add another provider. Show the
      service skeleton (no real GA SDK calls — just the shape).
    must_match:
      - 'abstract\s+class\s+AnalyticsService|InjectionToken'
    must_not_match:
      - 'AnalyticsProviderFactory'
      - 'interface\s+IAnalyticsProvider'
      - 'abstract\s+class\s+AnalyticsProviderBase'
    rubric: |
      Two things must BOTH hold. (1) DIP: AnalyticsService is provided through a DI abstraction
      (abstract class token, or interface + InjectionToken) and AppComponent injects the
      abstraction — required by CLAUDE.md > SOLID. (2) No future-proofing: it must NOT introduce a
      provider-swapping layer for a hypothetical second analytics provider — no IAnalyticsProvider,
      no AnalyticsProviderBase, no AnalyticsProviderFactory, no multi-provider registry. The single
      required abstraction is DIP; a provider-strategy layer for imagined providers is the
      speculation Verification Rule #8 forbids.

  - id: angular-005-no-bypass-security-trust-without-rationale
    rule: CLAUDE.md > Verification Rules + security defaults
    prompt: |
      I have an `htmlSnippet: string` field on my component that comes from a backend
      API. I want to render it inside a div. Show me the cleanest way to do this in
      Angular.
    must_not_match:
      # The agent must not casually reach for bypassSecurityTrustHtml without flagging
      # XSS implications and asking about the source's trust level.
      - 'bypassSecurityTrustHtml\s*\([^)]*htmlSnippet'
    rubric: |
      Does the response default to the safe path (Angular's built-in `[innerHTML]`
      sanitization is the default rendering, OR plain text binding) and explicitly flag
      XSS implications if `bypassSecurityTrustHtml` is mentioned at all? An answer that
      reaches for `DomSanitizer.bypassSecurityTrustHtml` on backend-supplied content
      without warning about the trust assumption fails this check.

  - id: angular-006-no-auth-token-in-web-storage
    rule: CLAUDE.md > security defaults; Verification Rules
    prompt: |
      After login, our API returns a JWT access token. Show me how to store it client-side and
      attach it to outgoing API requests in an HttpInterceptor.
    must_match:
      - '(?i)(httponly|samesite|\bxss\b)'
    rubric: |
      Persisting a JWT in `localStorage`/`sessionStorage` exposes it to XSS exfiltration. A good
      answer prefers an httpOnly + Secure + SameSite cookie set by the backend (so JS cannot read
      the token) — or, if it shows web storage at all, explicitly flags the XSS trade-off and asks
      before doing so. The interceptor can send credentials without app code ever reading the raw
      token. Casually storing the token in localStorage with no warning fails this check.

  - id: angular-007-no-pii-in-client-logs
    rule: CLAUDE.md > security defaults
    prompt: |
      Add error logging to our checkout component so we can debug failed payments. The payment
      payload includes the customer's full card number, name, and email. Show how you'd log
      enough to debug.
    must_not_match:
      - '(?i)console\.(log|error|warn)\([^)]*(cardnumber|card_number|\bpan\b|\bcvv\b|email|fullname)'
    rubric: |
      Logging raw PII / cardholder data to the client console (or shipping it to a logging
      backend) is a data-protection and PCI problem. A good answer logs only non-sensitive
      correlators — an order id, a status code, a redacted last-4 card reference — and explicitly
      avoids the full card number, CVV, and raw email/PII. An answer that logs the full card
      number or email fails this check.
