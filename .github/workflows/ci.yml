name: CI

# Repo-scale docs-sync-check for the authoring repo: proves src/ -> dist/ freshness on every
# push/PR (rebuild + diff must be empty), that every dist passes its own template-checks and
# parse gates (validate-dist), and that the hook test suites pass inside each dist.
#
# windows leg drives the .ps1 twins; linux leg drives the .sh twins — each leg rebuilds with
# its own twin and diffs against the committed golden dist, so composer twin divergence fails
# one of the two legs.
#
# The strict fidelity-check legs (dist == freeze-v0.25.5 baseline) were retired at the v0.26.0
# release — the merge's zero-behaviour-change was proven and permanently recorded (WSD-012/018),
# and v0.26.0 deliberately changes shipped content (actions/checkout v4->v5), so the freeze tags
# are no longer the baseline. The freshness gate (rebuild + git diff) now fully guards src->dist.
# scripts/fidelity-check.{ps1,sh} remain for manual re-audit against the pre-restructure tag.

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Compose dists (build.ps1 twin)
        run: |
          pwsh -NoProfile -File scripts/build.ps1 dotnet
          pwsh -NoProfile -File scripts/build.ps1 angular
          pwsh -NoProfile -File scripts/build.ps1 monorepo
      - name: Dist freshness (rebuild == committed golden dist)
        run: |
          git add -A dist
          git diff --cached --exit-code --stat -- dist
      - name: Context footprint (context-footprint.ps1 twin)
        run: pwsh -NoProfile -File scripts/context-footprint.ps1 -Check
      - name: Validate dists (parse gates + per-dist template-checks)
        run: |
          pwsh -NoProfile -File scripts/validate-dist.ps1 dotnet
          pwsh -NoProfile -File scripts/validate-dist.ps1 angular
          pwsh -NoProfile -File scripts/validate-dist.ps1 monorepo
      - name: Hook test suites per dist
        run: |
          pwsh -NoProfile -File dist/dotnet/tests/hooks/Invoke-HookTests.ps1
          pwsh -NoProfile -File dist/angular/tests/hooks/Invoke-HookTests.ps1
          pwsh -NoProfile -File dist/monorepo/tests/hooks/Invoke-HookTests.ps1
      - name: Meta-hook test suite (bom-fix + repo-wide BOM gate)
        run: pwsh -NoProfile -File .claude/hooks/tests/Invoke-HookTests.ps1

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Compose dists (build.sh twin)
        run: |
          bash scripts/build.sh dotnet
          bash scripts/build.sh angular
          bash scripts/build.sh monorepo
      - name: Dist freshness (rebuild == committed golden dist)
        run: |
          git add -A dist
          git diff --cached --exit-code --stat -- dist
      - name: Context footprint (context-footprint.sh twin)
        run: bash scripts/context-footprint.sh -Check
      - name: Validate dists (parse gates + per-dist template-checks)
        run: |
          bash scripts/validate-dist.sh dotnet
          bash scripts/validate-dist.sh angular
          bash scripts/validate-dist.sh monorepo
      - name: Hook test suites per dist (exercises the .sh twins via bash)
        run: |
          pwsh -NoProfile -File dist/dotnet/tests/hooks/Invoke-HookTests.ps1
          pwsh -NoProfile -File dist/angular/tests/hooks/Invoke-HookTests.ps1
          pwsh -NoProfile -File dist/monorepo/tests/hooks/Invoke-HookTests.ps1
      - name: Meta-hook test suite (bom-fix + repo-wide BOM gate)
        run: pwsh -NoProfile -File .claude/hooks/tests/Invoke-HookTests.ps1
